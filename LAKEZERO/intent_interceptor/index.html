<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent Interceptor | Secure Layer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.05)',
                        glassBorder: 'rgba(255, 255, 255, 0.1)',
                        neonGreen: '#00ff88',
                        neonGreenDim: 'rgba(0, 255, 136, 0.1)',
                    },
                    backdropBlur: {
                        xs: '2px',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #111827 0%, #000000 100%);
            height: 100vh;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glassBorder);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: var(--neonGreen);
            box-shadow: 0 0 15px var(--neonGreenDim);
            outline: none;
        }

        .btn-neon {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-neon:active {
            transform: scale(0.95);
        }

        .btn-neon:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }
    </style>
</head>

<body class="flex items-center justify-center text-gray-200 selection:bg-neonGreen selection:text-black">

    <!-- Background Elements -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-900/20 rounded-full blur-3xl animate-pulse-slow">
        </div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-900/20 rounded-full blur-3xl animate-pulse-slow"
            style="animation-delay: 1.5s;"></div>
    </div>

    <div class="glass-card rounded-2xl p-8 w-full max-w-lg relative overflow-hidden">
        <!-- Header -->
        <div class="mb-8 text-center">
            <div
                class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-neonGreen/10 mb-4 border border-neonGreen/20">
                <svg class="w-6 h-6 text-neonGreen" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight mb-1">Intent Interceptor</h1>
            <p class="text-sm text-gray-400 font-light">Secure Ed25519 Signing Layer</p>
        </div>

        <!-- Input Area -->
        <div class="space-y-6">
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-2 ml-1">API
                    Key</label>
                <input type="text" id="apiKeyInput" value="LAKE-GOLD-LICENSE-2025"
                    class="input-glass w-full rounded-lg px-4 py-3 text-white placeholder-gray-600 font-mono text-sm mb-4 border-neonGreen/30 focus:border-neonGreen">

                <label
                    class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-2 ml-1">Payload</label>
                <input type="text" id="messageInput" value="TX: 8f3a-2b1c-9d4e"
                    class="input-glass w-full rounded-lg px-4 py-3 text-white placeholder-gray-600 font-mono text-sm">
            </div>

            <button id="signBtn"
                class="btn-neon w-full py-3.5 rounded-lg text-black font-bold text-sm uppercase tracking-wide shadow-lg flex items-center justify-center gap-2 group">
                <span>Assinar Intenção</span>
                <svg class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </button>
        </div>

        <!-- Result Area -->
        <div id="output" class="hidden mt-8 pt-6 border-t border-white/5 animate-fade-in">
            <div class="flex items-center justify-between mb-4">
                <span class="text-xs font-medium text-gray-500 uppercase">Assinatura Gerada</span>
                <span
                    class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-neonGreen/10 border border-neonGreen/20 text-neonGreen text-[10px] font-bold uppercase tracking-wider shadow-[0_0_10px_rgba(0,255,136,0.2)]">
                    <span class="w-1.5 h-1.5 rounded-full bg-neonGreen animate-pulse"></span>
                    Latency: Instant (<span id="timeTaken">0.00</span>ms)
                </span>
            </div>

            <div class="relative group cursor-pointer" onclick="navigator.clipboard.writeText(this.innerText)">
                <div
                    class="absolute -inset-2 bg-gradient-to-r from-neonGreen/20 to-blue-500/20 rounded-lg blur opacity-0 group-hover:opacity-100 transition duration-500">
                </div>
                <div id="signatureResult"
                    class="relative bg-black/40 rounded-lg p-4 font-mono text-xs text-gray-300 break-all border border-white/5 hover:border-white/10 transition-colors">
                    <!-- Signature will appear here -->
                </div>
                <div
                    class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity text-[10px] text-gray-500 bg-black/80 px-1.5 py-0.5 rounded">
                    Click to copy</div>
            </div>
        </div>
    </div>

    <script type="module">
        import init, { sign_message } from './pkg/intent_interceptor.js';

        async function run() {
            await init();

            const btn = document.getElementById('signBtn');
            const input = document.getElementById('messageInput');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const output = document.getElementById('output');
            const sigResult = document.getElementById('signatureResult');
            const timeDisplay = document.getElementById('timeTaken');

            btn.addEventListener('click', async () => {
                const message = input.value;
                const apiKey = apiKeyInput.value;

                // Reset animation
                output.classList.add('hidden');
                output.classList.remove('animate-fade-in');

                // Force reflow
                void output.offsetWidth;

                const start = performance.now();

                try {
                    const signature = await sign_message(message, apiKey);
                    const end = performance.now();

                    sigResult.innerText = signature;
                    sigResult.classList.remove('text-red-400', 'border-red-500/30');
                    sigResult.classList.add('text-gray-300', 'border-white/5');

                    timeDisplay.innerText = (end - start).toFixed(2);

                    output.classList.remove('hidden');
                    output.classList.add('animate-fade-in');
                } catch (e) {
                    console.error("Erro ao assinar:", e);

                    sigResult.innerText = e;
                    sigResult.classList.remove('text-gray-300', 'border-white/5');
                    sigResult.classList.add('text-red-400', 'border-red-500/30');

                    timeDisplay.innerText = "0.00";
                    output.classList.remove('hidden');
                    output.classList.add('animate-fade-in');
                }
            });
        }

        run();
    </script>
</body>

</html>
