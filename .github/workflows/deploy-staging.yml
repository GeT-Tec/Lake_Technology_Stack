name: Deploy Staging

on:
  push:
    branches: [develop, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test --if-present
      
      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          NEXT_PUBLIC_DEFAULT_NETWORK: testnet
          NEXT_PUBLIC_RPC_URL: ${{ secrets.STAGING_RPC_URL }}
          NEXT_PUBLIC_CHAIN_ID: ${{ secrets.STAGING_CHAIN_ID }}
          NEXT_PUBLIC_ASSET_TOKEN_ADDRESS: ${{ secrets.STAGING_ASSET_TOKEN_ADDRESS }}
          NEXT_PUBLIC_MARKETPLACE_ADDRESS: ${{ secrets.STAGING_MARKETPLACE_ADDRESS }}
          NEXT_PUBLIC_WAITLIST_ADDRESS: ${{ secrets.STAGING_WAITLIST_ADDRESS }}
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Uncomment and configure for your deployment platform
      # - name: Deploy to Staging
      #   run: |
      #     # Add your deployment commands here
      #     # Example for Vercel:
      #     # npx vercel --token=${{ secrets.VERCEL_TOKEN }} --env staging
      
      - name: Health Check
        run: |
          echo "Waiting for deployment..."
          sleep 30
          # curl -f ${{ secrets.STAGING_URL }}/api/health || exit 1
          echo "Staging deployment completed successfully!"
